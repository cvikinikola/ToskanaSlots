<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 800" width="900" height="800">
	<defs>
		<linearGradient id="goldFrame" x1="0" y1="0" x2="0" y2="1">
			<stop offset="0%"  stop-color="#fff8d4"/>
			<stop offset="40%" stop-color="#ffd147"/>
			<stop offset="100%" stop-color="#5a3a08"/>
		</linearGradient>
		<linearGradient id="goldFrameInner" x1="0" y1="0" x2="0" y2="1">
			<stop offset="0%" stop-color="#7a5418"/>
			<stop offset="50%" stop-color="#ffd147"/>
			<stop offset="100%" stop-color="#fff8d4"/>
		</linearGradient>
		<linearGradient id="plaque" x1="0" y1="0" x2="0" y2="1">
			<stop offset="0%" stop-color="#3a1a30"/>
			<stop offset="50%" stop-color="#1a0a18"/>
			<stop offset="100%" stop-color="#0a0408"/>
		</linearGradient>
		<linearGradient id="boardBg" x1="0" y1="0" x2="0" y2="1">
			<stop offset="0%" stop-color="#3a1a4a" stop-opacity="0.85"/>
			<stop offset="100%" stop-color="#1a0820" stop-opacity="0.85"/>
		</linearGradient>
		<radialGradient id="gem" cx="50%" cy="40%" r="60%">
			<stop offset="0%" stop-color="#ffaaaa"/>
			<stop offset="55%" stop-color="#d62828"/>
			<stop offset="100%" stop-color="#3a0608"/>
		</radialGradient>
		<radialGradient id="blueGem" cx="50%" cy="40%" r="60%">
			<stop offset="0%" stop-color="#aaccff"/>
			<stop offset="55%" stop-color="#3060c8"/>
			<stop offset="100%" stop-color="#0a1838"/>
		</radialGradient>
	</defs>

	<!-- Outer ornate gold rim -->
	<rect x="40" y="80" width="820" height="660" rx="24" fill="none" stroke="url(#goldFrame)" stroke-width="48"/>
	<!-- Inner gold rim -->
	<rect x="76" y="116" width="748" height="588" rx="14" fill="none" stroke="url(#goldFrameInner)" stroke-width="6"/>
	<rect x="86" y="126" width="728" height="568" rx="10" fill="none" stroke="#fff8d4" stroke-width="1.5" stroke-opacity="0.55"/>

	<!-- Side runic medallions -->
	<g fill="url(#goldFrame)" stroke="#3a2208" stroke-width="2.5">
		<circle cx="40" cy="410" r="36"/>
		<circle cx="40" cy="410" r="18" fill="#3a1430"/>
		<circle cx="860" cy="410" r="36"/>
		<circle cx="860" cy="410" r="18" fill="#3a1430"/>
	</g>
	<text x="40" y="420" text-anchor="middle" font-family="serif" font-weight="900" font-size="26" fill="#ffd147">ᚦ</text>
	<text x="860" y="420" text-anchor="middle" font-family="serif" font-weight="900" font-size="26" fill="#ffd147">ᛟ</text>

	<!-- Ornate corner flourishes -->
	<g fill="url(#goldFrame)" stroke="#3a2208" stroke-width="1.5">
		<path d="M40,80 L120,80 L40,160 Z"/>
		<path d="M860,80 L780,80 L860,160 Z"/>
		<path d="M40,740 L120,740 L40,660 Z"/>
		<path d="M860,740 L780,740 L860,660 Z"/>
	</g>
	<g fill="#3a2208">
		<circle cx="80" cy="120" r="6"/>
		<circle cx="820" cy="120" r="6"/>
		<circle cx="80" cy="700" r="6"/>
		<circle cx="820" cy="700" r="6"/>
	</g>

	<!-- ── TOP enormous ornate plaque with HAMMER OF THOR + axe wings ── -->
	<g transform="translate(450 76)">
		<!-- Wing decorations flanking plaque -->
		<g fill="url(#goldFrame)" stroke="#3a2208" stroke-width="2">
			<path d="M-300,8 Q-340,-12 -380,4 Q-350,16 -340,8 Q-320,28 -300,18 Z"/>
			<path d="M300,8 Q340,-12 380,4 Q350,16 340,8 Q320,28 300,18 Z"/>
		</g>

		<!-- Plaque shield -->
		<path d="M-280,-22 L-258,-72 L258,-72 L280,-22 L246,38 L210,62 L-210,62 L-246,38 Z"
			fill="url(#plaque)" stroke="url(#goldFrame)" stroke-width="4"/>
		<path d="M-258,-30 L-240,-62 L240,-62 L258,-30 L226,28 L196,52 L-196,52 L-226,28 Z"
			fill="none" stroke="url(#goldFrame)" stroke-width="1.5" stroke-opacity="0.6"/>

		<!-- Side gems -->
		<circle cx="-258" cy="-8" r="16" fill="url(#gem)" stroke="#3a2208" stroke-width="2"/>
		<circle cx="258"  cy="-8" r="16" fill="url(#gem)" stroke="#3a2208" stroke-width="2"/>

		<!-- Title text -->
		<text y="-22" text-anchor="middle" font-family="serif" font-weight="800" font-size="30" fill="#ffd147" letter-spacing="6">HAMMER OF</text>
		<text y="36" text-anchor="middle" font-family="serif" font-weight="900" font-size="66" fill="#ffd147" stroke="#3a1006" stroke-width="1.6" paint-order="stroke" letter-spacing="8">THOR</text>

		<!-- Side runes -->
		<text x="-180" y="30" text-anchor="middle" font-family="serif" font-weight="900" font-size="42" fill="#ffd147">ᚦ</text>
		<text x="180"  y="30" text-anchor="middle" font-family="serif" font-weight="900" font-size="42" fill="#ffd147">ᛟ</text>

		<!-- Top central jewel -->
		<circle cx="0" cy="-58" r="14" fill="url(#blueGem)" stroke="#3a2208" stroke-width="1.5"/>
	</g>

	<!-- ── BOTTOM ornament — crossed Mjolnirs + central gem ── -->
	<g transform="translate(450 740)">
		<path d="M-180,0 L-160,30 L160,30 L180,0 L150,-26 L-150,-26 Z"
			fill="url(#plaque)" stroke="url(#goldFrame)" stroke-width="3"/>
		<g transform="translate(-70 4) rotate(-30)">
			<rect x="-3" y="-22" width="6" height="44" fill="#5a3a18" stroke="#1a0a04" stroke-width="1"/>
			<rect x="-20" y="-32" width="40" height="20" rx="2" fill="#a8b2c0" stroke="#1a1a22" stroke-width="1.5"/>
			<rect x="-16" y="-28" width="6" height="12" fill="#fff8d4" fill-opacity="0.4"/>
		</g>
		<g transform="translate(70 4) rotate(30)">
			<rect x="-3" y="-22" width="6" height="44" fill="#5a3a18" stroke="#1a0a04" stroke-width="1"/>
			<rect x="-20" y="-32" width="40" height="20" rx="2" fill="#a8b2c0" stroke="#1a1a22" stroke-width="1.5"/>
			<rect x="-16" y="-28" width="6" height="12" fill="#fff8d4" fill-opacity="0.4"/>
		</g>
		<circle cx="0" cy="2" r="11" fill="url(#gem)" stroke="#3a2208" stroke-width="2"/>
	</g>
</svg>

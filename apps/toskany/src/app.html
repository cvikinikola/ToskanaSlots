<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<title>Toskany Harvest</title>
		<meta
			name="description"
			content="Toskany Harvest — 7×7 cluster pays, tumble cascades, spot multipliers up to ×1024, Vendemmia Free Spins, buy bonus 100×, max win 25,000×."
		/>
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" />
		<meta name="viewport" content="width=device-width" />
		<!-- DEV MOCK: redirects RGS requests to the local Vite dev server. Remove before connecting to a real RGS backend. -->
		<script>
		(function() {
			var host = location.hostname;
			var isLocalDev =
				host === 'localhost' ||
				host === '127.0.0.1' ||
				/^192\.168\.\d{1,3}\.\d{1,3}$/.test(host) ||
				/^10\.\d{1,3}\.\d{1,3}\.\d{1,3}$/.test(host) ||
				host.endsWith('.ngrok-free.app') ||
				host.endsWith('.ngrok.io') ||
				host.indexOf('ngrok') !== -1 ||
				host === 'igraj.co.rs';
			if (!isLocalDev) return;
			var LOCAL = location.origin;
			function patchFetch(fn) {
				return function devFetch(input, init) {
					var url = input instanceof Request ? input.url : String(input);
					if (url.indexOf('/wallet/') !== -1 || url.indexOf('/bet/event') !== -1 || url.indexOf('/bet/replay') !== -1) {
						var path = url.replace(/^https?:\/\/[^/]*/, '');
						if (!path.startsWith('/')) path = '/' + path.replace(/^\/+/, '');
						var local = LOCAL + path;
						console.info('[mock-rgs]', url, '->', local);
						return fn.call(this, local, init instanceof Headers ? init : (init || {}));
					}
					return fn.apply(this, arguments);
				};
			}
			window.fetch = patchFetch(window.fetch);
		})();
		</script>
		%sveltekit.head%
	</head>
	<body style="margin: 0; padding: 0; overflow: hidden; background-color: black">
		<div>%sveltekit.body%</div>
	</body>
</html>
